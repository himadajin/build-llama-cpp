services:
    open-web-ui:
        image: ghcr.io/open-webui/open-webui:v0.10.2
        ports:
            - "${OPEN_WEBUI_HOST_PORT:-3000}:${OPEN_WEBUI_CONTAINER_PORT:-8080}"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - "${OPEN_WEBUI_VOLUME:-open-webui}:/app/backend/data"

volumes:
    open-webui:
